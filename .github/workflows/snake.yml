name: generate animated snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: evadiva3
          outputs: |
            dist/github-contribution-grid-snake-dark.svg?color_snake=#FFD9EC&color_dots=#221a24,#6b2646,#a8305f,#FF6FB5,#FF8CC8
      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
